<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lys browser renderer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <h1>Lys browser renderer</h1>
    <p class="intro">
      Minimal browser version that loads the Futhark/WebGPU build,
      initializes the Lys state, and renders one frame to the canvas.
    </p>

    <div class="layout">
      <section class="card">
        <h2>Canvas</h2>
        <div class="body">
          <canvas id="surface" tabindex="0"></canvas>
        </div>
      </section>

      <aside class="card">
        <h2>Status</h2>
        <div class="body">
          <div class="row">
            <button id="restartBtn">Restart</button>
            <button id="renderBtn">Render once</button>
          </div>
          <pre id="status">Loading...</pre>
        </div>
      </aside>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
