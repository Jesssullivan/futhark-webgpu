<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Futhark WebGPU vs WASM Interface Compare</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; }
      .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
      button { padding: 8px 12px; }
      pre { background: #111; color: #eee; padding: 12px; border-radius: 8px; overflow:auto; }
      .ok { color: #7CFC00; }
      .bad { color: #ff6b6b; }
      .dim { color: #aaa; }
    </style>
  </head>

  <body>
    <h1>Futhark WebGPU vs WASM Interface Compare</h1>
    <p class="dim">
      This page compiles the same <code>probe.fut</code> to both backends and runs identical calls to compare JS API shape.
    </p>

    <div class="row">
      <button id="run">Run comparison</button>
      <label><input type="checkbox" id="details" checked /> verbose details</label>
    </div>

    <h3>Status</h3>
    <pre id="status"></pre>

    <!-- Generated by: futhark webgpu --library -o build/probe_webgpu probe.fut -->
    <script src="build/probe_webgpu.js"></script>

    <!-- Test harness (ES module so we can import build/probe_wasm.mjs) -->
    <script type="module" src="main.js"></script>
  </body>
</html>
