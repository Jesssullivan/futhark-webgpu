<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Futhark WebGPU Mandelbrot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    h1 { margin: 0.5rem 0; font-size: 1.4rem; color: #a0c4ff; }
    canvas {
      border: 1px solid #333;
      border-radius: 4px;
      max-width: 100%;
      height: auto;
    }
    #status {
      font-family: monospace;
      font-size: 0.85rem;
      color: #888;
      margin: 0.5rem 0;
      white-space: pre-line;
      max-width: 800px;
    }
    .info {
      font-size: 0.75rem;
      color: #666;
      margin-top: 1rem;
      text-align: center;
    }
    .info a { color: #7090b0; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>Futhark WebGPU Mandelbrot</h1>
  <div id="status">Checking WebGPU support...</div>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div class="info">
    Requires Chrome 133+ / Firefox 141+ / Safari 26+ with WebGPU.<br>
    Server must send <code>Cross-Origin-Opener-Policy: same-origin</code> and
    <code>Cross-Origin-Embedder-Policy: credentialless</code> headers.<br>
    <a href="https://github.com/diku-dk/futhark-webgpu">diku-dk/futhark-webgpu</a> |
    <a href="https://futhark-lang.org">futhark-lang.org</a>
  </div>

  <!-- Generated by: futhark webgpu --library -o sebastian sebastian.fut -->
  <script src="sebastian.js"></script>

  <script>
    const status = document.getElementById('status');
    function log(msg) { status.textContent += '\n' + msg; }

    async function run() {
      // Check WebGPU
      if (!navigator.gpu) {
        status.classList.add('error');
        log('ERROR: WebGPU not available in this browser.');
        log('Requires Chrome 133+ / Firefox 141+ / Safari 26+');
        return;
      }
      log('WebGPU available.');

      // Check SharedArrayBuffer (needs COOP/COEP headers)
      if (typeof SharedArrayBuffer === 'undefined') {
        status.classList.add('error');
        log('ERROR: SharedArrayBuffer not available.');
        log('Server must send COOP/COEP headers.');
        log('Use: just serve, or Caddy, or the Containerfile.');
        return;
      }
      log('SharedArrayBuffer available.');

      // Check Float16Array
      if (typeof Float16Array === 'undefined') {
        status.classList.add('error');
        log('ERROR: Float16Array not available (Chrome 133+ required).');
        return;
      }

      try {
        log('Initializing Emscripten module...');
        const m = await Module();
        log('Creating Futhark context (WebGPU device)...');
        const fut = new FutharkModule();
        await fut.init(m);
        log('Futhark context ready.');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const max_depth = 50;
        const [xmin, xmax] = [-1.7, 1.1];
        const [ymin, ymax] = [-1.4, 1.4];

        log('Computing Mandelbrot (' + width + 'x' + height + ', depth=' + max_depth + ')...');
        const t0 = performance.now();

        const [buf] = await fut.entry.main(
          BigInt(width), BigInt(height), max_depth,
          xmin, ymin, xmax, ymax
        );

        const t1 = performance.now();
        log('Compute: ' + (t1 - t0).toFixed(0) + ' ms');

        const vals = await buf.values();
        const colors = new Uint8Array(vals.buffer, vals.byteOffset, vals.length * 4);

        const imgData = ctx.createImageData(width, height);
        imgData.data.set(colors);
        ctx.putImageData(imgData, 0, 0);

        const t2 = performance.now();
        log('Render: ' + (t2 - t1).toFixed(0) + ' ms (total: ' + (t2 - t0).toFixed(0) + ' ms)');

        buf.free();
        fut.free();
      } catch (e) {
        status.classList.add('error');
        log('ERROR: ' + e.message);
        if (e.message.includes('device') || e.message.includes('Device')) {
          log('Hint: Your GPU may not support ShaderF16.');
          log('Try: chrome://flags/#enable-unsafe-webgpu');
        }
        console.error(e);
      }
    }

    window.addEventListener('load', run);
  </script>
</body>
</html>
